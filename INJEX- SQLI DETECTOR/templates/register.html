<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Command Injection Prevention</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <style>
        body {
            padding-top: 50px;
            background-color: #121212;
            color: #e0e0e0;
        }
        .register-form {
            max-width: 400px;
            margin: 0 auto;
            padding: 15px;
            background-color: #1e1e1e;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }
        .register-form h2 {
            margin-bottom: 20px;
            text-align: center;
            color: #ffffff;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .alert {
            margin-bottom: 15px;
        }
        .form-control {
            background-color: #333333;
            border-color: #444444;
            color: #e0e0e0;
        }
        .form-control:focus {
            background-color: #3a3a3a;
            border-color: #007bff;
            color: #ffffff;
            box-shadow: 0 0 0 0.2rem rgba(0, 123, 255, 0.25);
        }
        .form-text {
            color: #9e9e9e;
        }
        .btn-primary {
            background-color: #2d5ca6;
            border-color: #2d5ca6;
        }
        .btn-primary:hover {
            background-color: #1e4583;
            border-color: #1e4583;
        }
        a {
            color: #63a8ff;
        }
        a:hover {
            color: #8ebeff;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="register-form">
            <h2>Register</h2>
            
            <form action="{{ url_for('register') }}" method="post">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" class="form-control" id="username" name="username" required>
                    <small class="form-text">Username can only contain letters, numbers, and underscores.</small>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" class="form-control" id="password" name="password" required>
                    <small class="form-text">Choose a strong password.</small>
                </div>
                <button type="submit" class="btn btn-primary btn-block">Register</button>
            </form>
            <div class="mt-3 text-center">
                <p>Already have an account? <a href="{{ url_for('login') }}">Login</a></p>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
</body>
</html>
